name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # The OpenCode plugin tests (TestOpencodePluginVitest / ...TypeScript)
      # run the locally installed vitest/tsc and never fetch on the fly, so
      # the plugin's dev dependencies must be present before `go test`.
      - name: Install OpenCode plugin deps
        run: npm ci
        working-directory: pkg/provider/plugins

      - name: Test
        run: go test ./...

      - name: Staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest && staticcheck ./...
